<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Algorithm Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .status-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .algo-status {
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 150px;
        }
    </style>
</head>
<body>
    <h1>Algorithm Status</h1>
    <div class="status-container">
        <div class="algo-status" id="algo1">Algo 1: Loading...</div>
        <div class="algo-status" id="algo2">Algo 2: Loading...</div>
        <div class="algo-status" id="algo3">Algo 3: Loading...</div>
    </div>

    <script>
        const algos = ["algo1", "algo2", "algo3"];

        algos.forEach(algo => {
            const eventSource = new EventSource(`http://localhost:9000/stream/${algo}`);

            eventSource.onmessage = function(event) {
                document.getElementById(algo).innerText = `${algo.toUpperCase()}: ${event.data}`;
            };

            eventSource.onerror = function() {
                document.getElementById(algo).innerText = `${algo.toUpperCase()}: Disconnected`;
                eventSource.close();
            };
        });
    </script>
</body>
</html>
